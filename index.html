<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hernando Reunion 2026 Event App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#004aad,#007bff);
color:white;
text-align:center;
}

header{
padding:25px;
font-size:28px;
font-weight:bold;
}

nav{
background:white;
padding:10px;
}

nav button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#004aad;
color:white;
font-weight:bold;
}

section{
display:none;
padding:20px;
}

.active{
display:block;
}

input,select{
padding:10px;
margin:5px;
width:220px;
}

.ticket{
border:2px dashed white;
padding:10px;
margin:5px;
display:inline-block;
background:#004aad;
}

.badge{
border:3px solid white;
padding:20px;
margin:10px;
display:inline-block;
background:#004aad;
width:200px;
}

table{
margin:auto;
background:white;
color:black;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:6px 10px;
}

#wheel{
margin:auto;
border-radius:50%;
border:8px solid white;
}

.pointer{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid yellow;
margin:auto;
}

</style>

</head>

<body>

<header>

Hernando Reunion 2026

</header>

<nav>

<button onclick="show('register')">Register</button>
<button onclick="show('attendees')">Attendees</button>
<button onclick="show('raffle')">Raffle</button>
<button onclick="show('tickets')">Tickets</button>
<button onclick="show('badges')">Badges</button>
<button onclick="show('stats')">Statistics</button>
<button onclick="show('qr')">QR Code</button>

</nav>

<section id="register" class="active">

<h2>Register Attendee</h2>

<input id="name" placeholder="Name">

<select id="family">
<option>Hernando</option>
<option>Cruz</option>
<option>Reyes</option>
<option>Other</option>
</select>

<select id="country">
<option>Philippines</option>
<option>USA</option>
<option>Canada</option>
<option>Other</option>
</select>

<br>

<button onclick="register()">Register</button>

<div id="ticketPreview"></div>

</section>

<section id="attendees">

<h2>Attendee List</h2>

<button onclick="exportExcel()">Export to Excel</button>

<table id="table">

<tr>
<th>Ticket</th>
<th>Name</th>
<th>Family</th>
<th>Country</th>
</tr>

</table>

</section>

<section id="raffle">

<h2>Raffle Wheel</h2>

<div class="pointer"></div>

<canvas id="wheel" width="300" height="300"></canvas>

<br>

<button onclick="spin()">SPIN</button>

<h2 id="winner"></h2>

</section>

<section id="tickets">

<h2>Printable Raffle Tickets</h2>

<button onclick="window.print()">Print Tickets</button>

<div id="ticketList"></div>

</section>

<section id="badges">

<h2>Badge Sheets</h2>

<div id="badgeList"></div>

</section>

<section id="stats">

<h2>Family and Country Statistics</h2>

<div id="statsBox"></div>

</section>

<section id="qr">

<h2>Registration QR</h2>

<div id="qrcode"></div>

</section>

<script>

let attendees = JSON.parse(localStorage.getItem("hernando_data")) || []

function save(){
localStorage.setItem("hernando_data",JSON.stringify(attendees))
}

function show(page){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(page).classList.add("active")
update()
}

function register(){

let name=document.getElementById("name").value
let family=document.getElementById("family").value
let country=document.getElementById("country").value

if(name==""){
alert("Enter name")
return
}

let ticket=1000+attendees.length+1

attendees.push({name,family,country,ticket})

save()

document.getElementById("ticketPreview").innerHTML=
"<div class='ticket'>"+name+"<br>"+country+"<br>Ticket #"+ticket+"</div>"

update()

}

function update(){

let table=document.getElementById("table")

if(table){

table.innerHTML="<tr><th>Ticket</th><th>Name</th><th>Family</th><th>Country</th></tr>"

attendees.forEach(p=>{
table.innerHTML+=
"<tr><td>"+p.ticket+"</td><td>"+p.name+"</td><td>"+p.family+"</td><td>"+p.country+"</td></tr>"
})

}

let tickets=""

attendees.forEach(p=>{
tickets+="<div class='ticket'>"+p.name+"<br>"+p.country+"<br>#"+p.ticket+"</div>"
})

document.getElementById("ticketList").innerHTML=tickets

let badges=""

attendees.forEach(p=>{
badges+="<div class='badge'>Hernando Reunion 2026<br>"+p.name+"<br>"+p.country+"</div>"
})

document.getElementById("badgeList").innerHTML=badges

let familyStats={}
let countryStats={}

attendees.forEach(p=>{
familyStats[p.family]=(familyStats[p.family]||0)+1
countryStats[p.country]=(countryStats[p.country]||0)+1
})

let s="<b>By Family</b><br>"

for(let f in familyStats){
s+=f+": "+familyStats[f]+"<br>"
}

s+="<br><b>By Country</b><br>"

for(let c in countryStats){
s+=c+": "+countryStats[c]+"<br>"
}

document.getElementById("statsBox").innerHTML=s

drawWheel()

}

function drawWheel(){

let canvas=document.getElementById("wheel")

if(!canvas) return

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,300,300)

let total=attendees.length

if(total==0) return

let angle=2*Math.PI/total

for(let i=0;i<total;i++){

ctx.beginPath()

ctx.moveTo(150,150)

ctx.arc(150,150,150,i*angle,(i+1)*angle)

ctx.fillStyle=i%2?"#ffcc00":"#ff6666"

ctx.fill()

ctx.save()

ctx.translate(150,150)

ctx.rotate(i*angle+angle/2)

ctx.fillStyle="black"

ctx.fillText(attendees[i].name,80,0)

ctx.restore()

}

}

let rotation=0

function spin(){

if(attendees.length==0){
alert("No attendees")
return
}

let index=Math.floor(Math.random()*attendees.length)

rotation+=360*5+(360/attendees.length)*index

document.getElementById("wheel").style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{
document.getElementById("winner").innerHTML="Winner: "+attendees[index].name
},5000)

}

function exportExcel(){

let csv="Ticket,Name,Family,Country\n"

attendees.forEach(p=>{
csv+=p.ticket+","+p.name+","+p.family+","+p.country+"\n"
})

let blob=new Blob([csv],{type:"text/csv"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="hernandos_reunion_attendees.csv"
a.click()

}

new QRCode(document.getElementById("qrcode"),{
text:window.location.href,
width:200,
height:200
})

update()

</script>

</body>
</html>
